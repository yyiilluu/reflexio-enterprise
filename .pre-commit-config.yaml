# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
repos:
  # 1. Standard file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: [--maxkb=1300]
      - id: debug-statements

  # 2. Ruff: replaces autoflake + pyupgrade + isort + black
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.6
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # 3. Tests: moved to pre-push (too slow for every commit)
  - repo: local
    hooks:
      - id: pytest-check
        name: Run unit tests
        entry: env PRECOMMIT=1 uv run pytest
        language: system
        types: [python]
        args: [reflexio/tests/]
        pass_filenames: false
        always_run: true
        require_serial: true
        stages: [pre-push]
